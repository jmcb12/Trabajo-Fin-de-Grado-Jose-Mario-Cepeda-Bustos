<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak Me Rehab</title>
    <style>
        body {
            background-color: #eeeeee;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        h1 {
            text-align: center;
            margin-top: 60px;
            font-size: 60px;
            font-weight: normal;
        }

        #cajaLogin {
            width: 600px;
            margin: 40px auto;
            border: 1px solid black;
            padding: 40px;
            background-color: white;
            text-align: center;
        }

        h2 {
            font-size: 40px;
            margin-bottom: 50px;
        }

        label {
            display: block;
            font-size: 20px;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        input {
            width: 300px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 60px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>SPEAK ME REHAB</h1>

    <div id="cajaLogin">
        <h2>INICIAR SESIÓN</h2>

        <form onsubmit="iniciarSesion(event)">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" required>

            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" required>

            <br>
            <button type="submit">Entrar</button>
        </form>
    </div>

    <script>
        async function iniciarSesion(event) {
            event.preventDefault();

            var usuario = document.getElementById("usuario").value;
            var contrasena = document.getElementById("contrasena").value;

            try {
                var respuesta = await fetch("http://localhost:3000/api/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: usuario,
                        password: contrasena
                    })
                });

                var datos = await respuesta.json();

                if (!respuesta.ok) {
                    alert("Usuario o contraseña incorrectos");
                    return;
                }

                localStorage.setItem("usuarioLogueado", JSON.stringify(datos));

                if (datos.rol == "paciente") {
                    window.location.href = "./paciente/index.html";
                }
                else if (datos.rol == "logopeda" || datos.rol == "profesional") {
                    window.location.href = "./logopeda/index.html";
                }
                else {
                    alert("El usuario no tiene un rol válido");
                }

            } catch (error) {
                alert("Error al conectar con el servidor");
            }
        }
    </script>

</body>
</html>
